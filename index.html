<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary SEO -->
    <title>ForgeField — Precision Software for Field Teams</title>
    <meta name="description" content="ForgeField builds modern software for contractors, skilled trades, and field service businesses. Estimating, scheduling, invoicing, crew management, and payments — starting with PaintPro, field management built for painting contractors." />
    <meta name="keywords" content="field service software, contractor software, trade business software, estimating software, crew scheduling, painting contractor software, PaintPro" />
    <meta name="author" content="Ryan William Hill" />
    <meta name="copyright" content="Copyright © 2026 ForgeField. All rights reserved." />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#0B0F19" />

    <!-- Open Graph / social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="ForgeField — Precision Software for Field Teams" />
    <meta property="og:description" content="Modern software built for contractors, skilled trades, and service businesses. Less paperwork, faster estimates, tighter scheduling — starting with PaintPro." />
    <meta property="og:image" content="/logo-mark-256.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="ForgeField — Precision Software for Field Teams" />
    <meta name="twitter:description" content="Modern software built for contractors, skilled trades, and service businesses that keep America moving." />

    <!-- Structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "ForgeField",
      "url": "https://forgefield.company",
      "description": "ForgeField builds modern software for contractors, skilled trades, and field service businesses.",
      "founder": { "@type": "Person", "name": "Ryan William Hill" }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "PaintPro Field Manager",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web, Android",
      "url": "https://forgefield.company/paintpro",
      "description": "Field management software built specifically for painting contractors: estimates, invoicing, painting inventory, paint calculator, crew time clock, Stripe payments, weather alerts, and property boundary mapping.",
      "offers": { "@type": "Offer", "price": "29.00", "priceCurrency": "USD" },
      "author": { "@type": "Organization", "name": "ForgeField" }
    }
    </script>

    <link rel="icon" href="/favicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="/logo-mark-256.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800;9..40,900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <!-- Apply saved theme before first paint (no flash on /paintpro) -->
    <script>
      try {
        var t = localStorage.getItem("pps-dark");
        if (t === "1" || (t === null && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
          document.documentElement.classList.add("dark");
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <!-- Copyright © 2026 ForgeField. All rights reserved. -->
    <div id="root"></div>
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
